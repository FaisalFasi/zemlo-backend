name: Backend CI

on:
  push:
  pull_request:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zemlo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zemlo_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zemlo_ci?schema=public&sslmode=disable
      JWT_SECRET: ci-only-jwt-secret-that-is-at-least-thirty-two-characters
      JWT_REFRESH_SECRET: ci-only-refresh-secret-that-is-at-least-thirty-two-characters
      JWT_EXPIRES_IN: 15m
      SESSION_EXPIRES_DAYS: 7
      CORS_ORIGINS: http://localhost:3000
      SWAGGER_ENABLED: 'true'
      TRUST_PROXY_HOPS: 0
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_MAX: 120
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Use stable npm version
        run: npm install --global npm@11.6.1

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Configure npm network retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate Prisma schema
        run: npx prisma validate --schema=prisma/schema

      - name: Apply migrations to CI database
        run: npx prisma migrate deploy --schema=prisma/schema

      - name: Run complete verification
        run: npm run verify

      - name: Verify OpenAPI contract is committed
        run: git diff --exit-code -- openapi.json

      - name: Audit dependencies
        run: npm audit --audit-level=high
